name: Update World Cup results

on:
  workflow_dispatch:
  schedule:
    # Run every hour. GitHub Actions cron uses UTC.
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update data/results.json
        run: npm run update

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "Update World Cup sweepstake results"
          git push
